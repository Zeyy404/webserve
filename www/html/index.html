<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Webserv</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
        }
        .links {
            margin-top: 30px;
        }
        .links a {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .links a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Welcome to Webserv!</h1>
        <p>
            Congratulations! Your HTTP server is up and running successfully.
        </p>
        <p>
            This is a custom-built HTTP/1.1 server written in C++98 as part of the 42 curriculum.
        </p>
        <div class="links">
            <a href="/uploads">📁 View Uploads</a>
            <a href="/cgi-bin">⚙️ CGI Scripts</a>
        </div>
        <div style="margin-top: 30px; background: rgba(255,255,255,0.15); padding: 20px; border-radius: 8px;">
            <h3>📤 Upload a File</h3>
            <form action="/uploads/" method="POST" enctype="multipart/form-data">
                <input type="file" name="file" style="margin: 10px 0; color: #333;"><br>
                <button type="submit" style="padding: 8px 24px; background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 1em;">
                    Upload
                </button>
            </form>
        </div>
        <p style="margin-top: 30px; font-size: 0.9em; opacity: 0.8;">
            Server: Webserv/1.0 | Protocol: HTTP/1.1
        </p>
    </div>
</body>
</html>
