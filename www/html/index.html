<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Webserv</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 3em;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
        }
        .links {
            margin-top: 30px;
        }
        .links a {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .links a:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .panel {
            margin-top: 30px;
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 8px;
        }
        .login-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .login-form input {
            flex: 1 1 180px;
            min-width: 0;
            padding: 9px 12px;
            border: none;
            border-radius: 5px;
            font-size: 1em;
        }
        button {
            padding: 9px 24px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        button.secondary {
            background: rgba(255,255,255,0.22);
        }
        .upload-form {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .upload-form input {
            flex: 1 1 220px;
            min-width: 0;
            color: #333;
            background: white;
            padding: 8px;
            border-radius: 5px;
        }
        .logout-form {
            margin-top: 14px;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Welcome to Webserv!</h1>
        <p>
            Congratulations! Your HTTP server is up and running successfully.
        </p>
        <p>
            This is a custom-built HTTP/1.1 server written in C++98 as part of the 42 curriculum.
        </p>
        <div class="links">
            <a href="/cgi-bin">⚙️ CGI Scripts</a>
            <a href="/my-uploads">🗂️ My Uploads</a>
        </div>

        <div class="panel">
            <h3 id="auth-title">🔐 Login</h3>
            <form id="login-form" class="login-form" action="/login" method="POST">
                <input type="text" name="username" placeholder="username" maxlength="32" required>
                <button type="submit">Login</button>
            </form>
            <div id="logged-in-box" class="hidden">
                <form class="upload-form" action="/uploads/" method="POST" enctype="multipart/form-data">
                    <input type="file" name="file" required>
                    <button type="submit">Upload</button>
                </form>
                <form class="logout-form" action="/logout" method="POST">
                    <button class="secondary" type="submit">Logout</button>
                </form>
            </div>
        </div>
        <p style="margin-top: 30px; font-size: 0.9em; opacity: 0.8;">
            Server: Webserv/1.0 | Protocol: HTTP/1.1
        </p>
    </div>
    <script>
        (function () {
            var title = document.getElementById('auth-title');
            var loginForm = document.getElementById('login-form');
            var loggedInBox = document.getElementById('logged-in-box');

            function showLoggedOut() {
                title.textContent = '🔐 Login';
                loginForm.classList.remove('hidden');
                loggedInBox.classList.add('hidden');
            }

            function showLoggedIn(username) {
                title.textContent = 'Welcome ' + username + '!';
                loginForm.classList.add('hidden');
                loggedInBox.classList.remove('hidden');
            }

            fetch('/session')
                .then(function (response) { return response.text(); })
                .then(function (text) {
                    var prefix = 'Logged in as ';
                    if (text.indexOf(prefix) !== 0) {
                        showLoggedOut();
                        return;
                    }
                    var username = text.slice(prefix.length).split('\n')[0];
                    showLoggedIn(username);
                })
                .catch(showLoggedOut);
        }());
    </script>
</body>
</html>
