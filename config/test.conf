# Simple test configuration for webserv

server {
    listen 127.0.0.1:8080;
    server_name test.local;
    
    root ./www/html;
    index index.html;
    
    error_page 404 /error_pages/404.html;
    
    location / {
        allowed_methods GET;
    }

    location ~ \.bla$ {
        allowed_methods POST;

        cgi_extension .bla ./cgi_tester;
    }

    location /post_body {
        allowed_methods POST;

        client_max_body_size 100;
    }

    location /directory {
        allowed_methods GET;

        root ./YoupiBanane;
        index youpi.bad_extension;
    }
}
